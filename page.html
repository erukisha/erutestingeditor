<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loading…</title>
<style>
  :root{
    --ink:#1f2330;
    --ink-soft:#414656;
    --muted:#7b8090;
    --line:#e7e8ee;
    --accent:#3b56d6;
    --code-bg:#f5f6fa;
    --maxw:680px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    line-height:1.65;
    background:#fff;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:48px 22px 96px}
  #content h1{font-size:2rem;line-height:1.2;letter-spacing:-.02em;margin:.2em 0 .6em}
  #content h2{font-size:1.45rem;line-height:1.25;letter-spacing:-.01em;margin:1.8em 0 .5em}
  #content h3{font-size:1.15rem;margin:1.5em 0 .4em}
  #content p{margin:0 0 1.1em}
  #content a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent}
  #content a:hover{border-bottom-color:var(--accent)}
  #content img{max-width:100%;height:auto;border-radius:8px;display:block;margin:1.4em 0}
  #content ul,#content ol{margin:0 0 1.1em;padding-left:1.4em}
  #content li{margin:.3em 0}
  #content blockquote{
    margin:1.4em 0;padding:.4em 1.1em;border-left:3px solid var(--accent);
    color:var(--ink-soft);background:#fafbff;border-radius:0 8px 8px 0;
  }
  #content code{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:.9em;background:var(--code-bg);padding:.15em .4em;border-radius:5px;
  }
  #content pre{
    background:var(--code-bg);padding:16px 18px;border-radius:10px;overflow:auto;margin:1.4em 0;
  }
  #content pre code{background:none;padding:0}
  #content hr{border:0;border-top:1px solid var(--line);margin:2.4em 0}
  #content table{border-collapse:collapse;width:100%;margin:1.4em 0;font-size:.95em}
  #content th,#content td{border:1px solid var(--line);padding:9px 12px;text-align:left}
  #content th{background:var(--code-bg)}
  .state{max-width:var(--maxw);margin:0 auto;padding:80px 22px;text-align:center;color:var(--muted)}
  .state strong{display:block;color:var(--ink);font-size:1.1rem;margin-bottom:.4em}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <main class="wrap"><article id="content"></article></main>
  <div class="state" id="state" style="display:none"></div>

  <!-- Markdown parser + sanitizer (run in the visitor's browser; no build needed) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script>
    // Folder (relative to this file) where the CMS saves content pages.
    var CONTENT_DIR = "content";

    function showState(html){
      document.querySelector(".wrap").style.display = "none";
      var s = document.getElementById("state");
      s.style.display = "block";
      s.innerHTML = html;
    }

    // Pull the page name from ?slug=  (e.g. page.html?slug=about -> about.md)
    function getSlug(){
      var p = new URLSearchParams(location.search).get("slug");
      if(!p) return null;
      // keep it safe: letters, numbers, dash, underscore only
      return /^[a-z0-9_-]+$/i.test(p) ? p : null;
    }

    // Strip simple "--- title: ... ---" front matter, return {title, body}.
    function splitFrontMatter(text){
      var m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
      if(!m) return { title: null, body: text };
      var title = null;
      m[1].split("\n").forEach(function(line){
        var t = line.match(/^title:\s*(.*)$/);
        if(t) title = t[1].trim().replace(/^["']|["']$/g, "");
      });
      return { title: title, body: text.slice(m[0].length) };
    }

    (function init(){
      var slug = getSlug();
      if(!slug){
        showState("<strong>No page selected</strong>Add <code>?slug=your-page</code> to the URL to load a page.");
        return;
      }
      fetch(CONTENT_DIR + "/" + slug + ".md", {cache:"no-cache"})
        .then(function(r){
          if(!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(text){
          var fm = splitFrontMatter(text);
          if(fm.title) document.title = fm.title;
          var dirty = marked.parse(fm.body);
          document.getElementById("content").innerHTML = DOMPurify.sanitize(dirty);
        })
        .catch(function(){
          document.title = "Page not found";
          showState("<strong>Page not found</strong>There's no content file named “" + slug + "”. Create it in the editor, then reload.");
        });
    })();
  </script>
</body>
</html>
